<!DOCTYPE html>

    <meta charset="utf-8" />
    <title>card</title>
    <meta name="viewport" content="viewport-fit=cover,width=device-width,user-scalable=no,initial-scale=1,maximum-scale=1">
    <style type="text/css">
      html, body, p {
        margin: 0;
        padding: 0;
      }
      div {
        box-sizing: border-box;
      }
      .card {
        width: 100%;
        height: 200px;
        border-radius: 12px;
        color: #FFF;
        padding: 40px 10%;
      }
      .card .card-nember {
        font-weight: bold;
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 40px;
      }
      .card .card-info {
        display: flex;
        gap: 20px;
      }
      .card .card-exp {
        font-size: 14px;
      }
      .card .card-exp p:nth-child(1) {
        font-size: 12px;
        margin-bottom: 10px;
      }
      .card .card-exp p:nth-child(2) {
        font-size: 16px;
        font-weight: bold;
      }
      .card .card-cvv {
        width: 70px;
        font-size: 14px;
      }
      .card .card-cvv p:nth-child(1) {
        font-size: 12px;
        margin-bottom: 10px;
      }
      .card .card-cvv p:nth-child(2) {
        font-size: 16px;
        font-weight: bold;
      }
      .card .card-content {
        height: 30px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-nember">
        <div class="card-content" id="card-pan"></div>
      </div>
      <div class="card-info">
        <div class="card-exp">
          <p>VALID THRU</p>
          <p>
            <div class="card-content" id="card-exp"></div>
          </p>
        </div>
        <div class="card-cvv">
          <p>CVV</p>
          <p>
            <div class="card-content" id="card-cvv"></div>
          </p>
        </div>
      </div>
    </div>

    <!-- Reference Widget.js -->
    <script src="https://static.univisioncard.com/api/sdk/card/1.0.0/index.min.js" type="text/javascript"></script>

    <script>
      const styles = {
        cardExp: {
          styles: {
            span: {
              background: "none",
              color: "#FFF",
              "font-family": "monospace",
              "font-size": "16px",
              "letter-spacing": "2px",
              "font-weight": "bold",
            },
          },
        },
      };
      const params = new URLSearchParams(window.location.search);
      const clientAccessToken = params.get('clientAccessToken');
      const background = params.get('background');

      const cardDom = document.querySelector('.card')
      
      if (background) {
        cardDom.style.background = `url('${background}') no-repeat`
        cardDom.style.backgroundSize = `cover`
      } else {
        cardDom.style.background = 'linear-gradient(135deg, #3b4a6b, #1e293b)';
      }
      // Call the bootstrap method
      widget.bootstrap({
        clientAccessToken,
        component: {
          showPan: {
            cardPan: {
              domId: "card-pan",
              format: true,
              styles: styles.cardExp.styles, // A custom styles object
            },
            cardExp: {
              domId: "card-exp",
              format: true,
              styles: styles.cardExp.styles, // A custom styles object
            },
            cardCvv: {
              domId: "card-cvv",
              styles: styles.cardExp.styles, // A custom styles object
            },
          },
        },
        callbackEvents: {
          onSuccess: () => console.log("Success!"),
          onFailure: (error) => console.error(error),
        },
      });
    </script>
