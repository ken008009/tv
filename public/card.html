<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>card</title>
    <meta name="viewport" content="viewport-fit=cover,width=device-width,user-scalable=no,initial-scale=1,maximum-scale=1">
    <style type="text/css">
      html, body, p {
        margin: 0;
        padding: 0;
      }
      div {
        box-sizing: border-box;
      }
      .card-nember {
        width: 90%;
        overflow: hidden;
        font-weight: bold;
        font-size: 16px;
      }
      .card-nember .card-content {
        height: 30px;
      }
    </style>
  </head>
  <body>
    <div class="card-nember">
      <div class="card-content" id="card-pan"></div>
    </div>

    <!-- Reference Widget.js -->
    <script src="https://static.univisioncard.com/api/sdk/card/1.0.0/index.min.js" type="text/javascript"></script>

    <script>
      const styles = {
        cardExp: {
          styles: {
            span: {
              background: "none",
              color: "#FFF",
              "font-family": "monospace",
              "font-size": "14px",
              "letter-spacing": "2px",
              "font-weight": "bold",
            },
          },
        },
      };
      const params = new URLSearchParams(window.location.search);
      const clientAccessToken = params.get('clientAccessToken');

      const cardDom = document.querySelector('.card')

      // Call the bootstrap method
      widget.bootstrap({
        clientAccessToken,
        component: {
          showPan: {
            cardPan: {
              domId: "card-pan",
              format: true,
              styles: styles.cardExp.styles, // A custom styles object
            }
          },
        },
        callbackEvents: {
          onSuccess: () => console.log("Success!"),
          onFailure: (error) => console.error(error),
        },
      });
    </script>
  </body>
</html>
